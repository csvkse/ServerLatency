<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raw Data - Server Latency</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="icon" href="/favicon.png" type="image/png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.loli.net" crossorigin>
    <link href="https://fonts.loli.net/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Orbitron:wght@600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        cyber: {
                            bg: '#0a0a0f', surf: '#12121e', edge: '#1a1a2e',
                            cyan: '#00f0ff', pink: '#ff00aa', purple: '#a855f7',
                            yellow: '#ffcc00', green: '#00ff88', red: '#ff3355',
                            text: '#e8e8f0', muted: '#8888aa', dim: '#555577'
                        }
                    },
                    fontFamily: {
                        display: ['Orbitron', 'sans-serif'],
                        body: ['Inter', '-apple-system', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Monaco', 'monospace'],
                    },
                    boxShadow: {
                        'neon': '0 0 8px rgba(0,240,255,.3)',
                        'neon-md': '0 0 16px rgba(0,240,255,.4)',
                    }
                }
            }
        }
    </script>
    
    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <style>
        * { scrollbar-width: thin; scrollbar-color: #1a1a2e #0a0a0f; }
        body { font-family: Inter, -apple-system, sans-serif; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0f; }
        ::-webkit-scrollbar-thumb { background: #1a1a2e; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #2a2a4e; }

        .cyber-input {
            background: #1a1a2e; border: 1px solid #1e1e3a; color: #e8e8f0;
            transition: border-color .3s, box-shadow .3s;
        }
        .cyber-input:focus {
            outline: none; border-color: #00f0ff; box-shadow: 0 0 8px rgba(0,240,255,.25);
        }
        
        .btn-neon-primary {
            background: rgba(0,240,255,.15); border: 1px solid #00f0ff; color: #00f0ff; transition: all .2s;
        }
        .btn-neon-primary:hover {
            background: rgba(0,240,255,.25); box-shadow: 0 0 16px rgba(0,240,255,.35);
        }

        .neon-border {
            border: 1px solid #1e1e3a;
            transition: border-color .3s, box-shadow .3s;
        }

        .code-block {
            background: #0d0d16;
            border: 1px solid #1a1a2e;
            border-radius: 8px;
            font-family: 'JetBrains Mono', Monaco, monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .bg-grid {
            background-image:
                linear-gradient(rgba(0,240,255,.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,240,255,.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>

<body class="min-h-screen bg-cyber-bg text-cyber-text bg-grid p-4 md:p-8">
    <div id="app" class="max-w-4xl mx-auto">
        <!-- Auth Modal -->
        <div v-if="!isAuthenticated" class="min-h-[80vh] flex items-center justify-center p-4">
            <div class="bg-cyber-surf border border-[#1e1e3a] p-8 rounded-xl shadow-neon-md w-full max-w-sm text-center">
                <h2 class="font-display text-cyber-cyan mb-6 tracking-widest">AUTHENTICATION</h2>
                <div class="relative mb-4">
                    <input v-model="accessKey" type="text" placeholder="Enter Access Key" class="cyber-input w-full rounded p-3 text-center font-mono tracking-widest pr-10" @keyup.enter="login">
                </div>
                <button @click="login" class="btn-neon-primary w-full py-2.5 rounded font-display tracking-widest font-bold">LOGIN</button>
                <div v-if="authError" class="text-cyber-red text-xs mt-3 font-mono">{{ authError }}</div>
            </div>
        </div>

        <!-- Data Dump -->
        <div v-else class="neon-border rounded-xl bg-cyber-surf overflow-hidden shadow-neon">
            <div class="px-4 py-3 border-b border-[#1e1e3a] flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <img src="/logo.png" alt="Logo" class="h-8 w-8 object-contain drop-shadow-[0_0_8px_rgba(0,240,255,0.6)] rounded-sm">
                    <h1 class="font-display text-lg tracking-[.15em] text-cyber-cyan">RAW<span class="text-cyber-text">_DATA</span></h1>
                    <span class="text-xs text-cyber-muted hidden sm:inline">// 实时数据流日志</span>
                </div>
                <div class="flex items-center gap-3">
                    <button @click="logout" class="text-xs font-mono text-cyber-red border border-cyber-red/30 px-2 py-1 rounded hover:bg-cyber-red/10">LOGOUT</button>
                    <select onchange="if(this.value) window.location.href = this.value" class="bg-cyber-bg text-cyber-cyan border border-[#1e1e3a] hover:border-cyber-cyan rounded px-2 py-1 outline-none transition-colors cursor-pointer text-[10px] font-mono">
                        <option value="" disabled selected>[ PAGE_JUMP ]</option>
                        <option value="/index.html">LATENCY_MATRIX</option>
                        <option value="/node.html">EDGE_NODE</option>
                        <option value="/data.html">RAW_DATA</option>
                        <option value="/admin.html">ADMIN_PANEL</option>
                    </select>
                    <span class="text-[10px] text-cyber-muted font-mono">// MATRIX_API</span>
                </div>
            </div>
            
            <div class="p-4">
                <div v-if="loading" class="text-cyber-dim font-mono text-xs animate-pulse">// Loading data stream...</div>
                <pre v-else class="code-block p-4 text-cyber-green/90 overflow-x-auto max-h-[70vh]">{{ dumpData }}</pre>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const params = new URLSearchParams(window.location.search);
                const urlKey = params.get('key');
                let initialKey = urlKey || localStorage.getItem('SL_KEY') || '';

                const isAuthenticated = ref(false);
                const accessKey = ref(initialKey);
                const authError = ref('');
                const loading = ref(true);
                const dumpData = ref('');

                const login = async () => {
                    authError.value = '';
                    try {
                        const res = await fetch(`/api/ServerLatency/Auth?key=${encodeURIComponent(accessKey.value)}`, { method: 'POST' });
                        if (res.ok) {
                            isAuthenticated.value = true;
                            localStorage.setItem('SL_KEY', accessKey.value);
                            fetchData();
                        } else {
                            authError.value = "ACCESS_DENIED";
                        }
                    } catch (e) {
                        authError.value = "CONNECTION_ERROR";
                    }
                };

                const logout = () => {
                    localStorage.removeItem('SL_KEY');
                    accessKey.value = '';
                    isAuthenticated.value = false;
                    dumpData.value = '';
                };

                const fetchData = async () => {
                    loading.value = true;
                    try {
                        const res = await fetch(`/api/ServerLatency/Matrix?key=${encodeURIComponent(accessKey.value)}`);
                        if (res.status === 401) { logout(); return; }
                        const data = await res.json();
                        // Verify if data is actually authenticated (handles optional auth endpoints gracefully)
                        if (data.isAuth === false && accessKey.value !== '') {
                            logout();
                            authError.value = "ACCESS_DENIED";
                            return;
                        }
                        dumpData.value = JSON.stringify(data, null, 2);
                    } catch (e) {
                        dumpData.value = "Error fetching data: " + e.message;
                    } finally {
                        loading.value = false;
                    }
                };

                onMounted(() => {
                    if (accessKey.value) {
                        login();
                    }
                });

                return {
                    isAuthenticated, accessKey, authError, loading, dumpData,
                    login, logout
                };
            }
        }).mount('#app');
    </script>
</body>

</html>
